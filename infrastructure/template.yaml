AWSTemplateFormatVersion: '2010-09-09'
Description: 'Serverless asset proxy - Secured OAC Architecture'

Parameters:
  ImageTag:
    Type: String
  ProjectName:
    Type: String

Resources:
  # --- Storage ---
  AssetBucket:
    Type: AWS::S3::Bucket
    Properties:
      BucketName: !Sub 'asset-proxy-${AWS::AccountId}-${AWS::Region}-vault'

  # --- Lambda Function ---
  AssetProxyFunction:
    Type: AWS::Lambda::Function
    Properties:
      FunctionName: !Sub 'asset-proxy-func-${ImageTag}'
      PackageType: Image
      Code:
        ImageUri: !Sub '${AWS::AccountId}.dkr.ecr.${AWS::Region}.amazonaws.com/zota-asset-proxy:${ImageTag}'
      Role: !Sub 'arn:aws:iam::${AWS::AccountId}:role/asset-proxy-lambda-role-manual'
      Architectures:
        - arm64
      Timeout: 20
      Environment:
        Variables:
          BUCKET_NAME: !Ref AssetBucket

  # --- Function URL (Secured with IAM) ---
  AssetFunctionUrl:
    Type: AWS::Lambda::Url
    Properties:
      AuthType: AWS_IAM # Switched from NONE to bypass sandbox SCPs
      TargetFunctionArn: !Ref AssetProxyFunction

  # --- Permissions (The Handshake) ---
  UrlInvokePermission:
    Type: AWS::Lambda::Permission
    Properties:
      FunctionName: !Ref AssetProxyFunction
      Action: lambda:InvokeFunctionUrl
      Principal: cloudfront.amazonaws.com
      SourceArn: !Sub 'arn:aws:cloudfront::${AWS::AccountId}:distribution/${AssetDistribution}'

  # --- CloudFront Security (OAC) ---
  LambdaOAC:
    Type: AWS::CloudFront::OriginAccessControl
    Properties: 
      OriginAccessControlConfig: 
        Name: !Sub '${AWS::StackName}-OAC'
        OriginAccessControlOriginType: lambda
        SigningBehavior: always
        SigningProtocol: sigv4

  # --- Distribution ---
  AssetDistribution:
    Type: AWS::CloudFront::Distribution
    Properties:
      DistributionConfig:
        Enabled: true
        HttpVersion: http2
        Origins:
          - Id: LambdaOrigin
            # Extracts the hostname from the Function URL
            DomainName: !Select [2, !Split ["/", !GetAtt AssetFunctionUrl.FunctionUrl]]
            OriginAccessControlId: !Ref LambdaOAC
            CustomOriginConfig:
              OriginProtocolPolicy: https-only
        DefaultCacheBehavior:
          TargetOriginId: LambdaOrigin
          ViewerProtocolPolicy: redirect-to-https
          # Managed-CachingOptimized
          CachePolicyId: 658327ea-f89d-4fab-a63d-7e88639e58f6
          # Managed-AllViewerExceptHostHeader (CRITICAL: Fixes the 403 Signature mismatch)
          OriginRequestPolicyId: b689b0a8-53d0-40a4-b40b-d8a843e231e9
          AllowedMethods: [GET, HEAD, OPTIONS]

Outputs:
  LambdaFunctionURL:
    Description: "The direct URL for the Lambda"
    Value: !GetAtt AssetFunctionUrl.FunctionUrl
  
  CloudFrontDomain:
    Description: "The public domain for the proxy"
    Value: !GetAtt AssetDistribution.DomainName
  
  LambdaRoleARN:
    Description: "The IAM Role executing the code"
    Value: !Sub 'arn:aws:iam::${AWS::AccountId}:role/asset-proxy-lambda-role-manual'

  DistributionID:
    Description: "The ID for cache invalidations"
    Value: !Ref AssetDistribution