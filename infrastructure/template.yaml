AWSTemplateFormatVersion: '2010-09-09'
Description: 'Serverless asset proxy - Secured OAC Architecture'

Parameters:
  ImageTag:
    Type: String
  ProjectName:
    Type: String

Resources:
  # --- Storage ---
  AssetBucket:
    Type: AWS::S3::Bucket
    Properties:
      BucketName: !Sub 'asset-proxy-${AWS::AccountId}-${AWS::Region}-vault'

  # --- Lambda Function ---
  AssetProxyFunction:
    Type: AWS::Lambda::Function
    Properties:
      FunctionName: !Sub 'asset-proxy-func-${ImageTag}'
      PackageType: Image
      Code:
        ImageUri: !Sub '${AWS::AccountId}.dkr.ecr.${AWS::Region}.amazonaws.com/zota-asset-proxy:${ImageTag}'
      Role: !Sub 'arn:aws:iam::${AWS::AccountId}:role/asset-proxy-lambda-role-manual'
      Architectures:
        - arm64
      Timeout: 20
      Environment:
        Variables:
          BUCKET_NAME: !Ref AssetBucket

  # --- Function URL (Secured with IAM) ---
  AssetFunctionUrl:
    Type: AWS::Lambda::Url
    Properties:
      AuthType: AWS_IAM # Switched from NONE to bypass sandbox SCPs
      TargetFunctionArn: !Ref AssetProxyFunction

  # --- Permissions (The Handshake) ---
  UrlInvokePermission:
    Type: AWS::Lambda::Permission
    Properties:
      FunctionName: !Ref AssetProxyFunction
      Action: lambda:InvokeFunctionUrl
      Principal: "*" # Keep it open for a moment
      FunctionUrlAuthType: NONE

  # --- CloudFront Security (OAC) ---
  LambdaOAC:
    Type: AWS::CloudFront::OriginAccessControl
    Properties: 
      OriginAccessControlConfig: 
        Name: !Sub '${AWS::StackName}-OAC'
        OriginAccessControlOriginType: lambda
        SigningBehavior: always
        SigningProtocol: sigv4

  # --- Distribution ---
  AssetDistribution:
    Type: AWS::CloudFront::Distribution
    Properties:
      DistributionConfig:
        Enabled: true
        HttpVersion: http2
        Origins:
          - Id: LambdaOrigin
            # This must be the Lambda URL hostname
            DomainName: !Select [2, !Split ["/", !GetAtt AssetFunctionUrl.FunctionUrl]]
            OriginAccessControlId: !Ref LambdaOAC
            CustomOriginConfig:
              OriginProtocolPolicy: https-only
            # --- THE MAGIC FIX ---
            OriginCustomHeaders:
              - HeaderName: "Host"
                HeaderValue: !Select [2, !Split ["/", !GetAtt AssetFunctionUrl.FunctionUrl]]
        DefaultCacheBehavior:
          TargetOriginId: LambdaOrigin
          ViewerProtocolPolicy: redirect-to-https
          AllowedMethods: [GET, HEAD, OPTIONS]
          # We move to manual forwarding to ensure Host is NOT included
          ForwardedValues:
            QueryString: true
            Cookies:
              Forward: none
            Headers:
              - Origin
              - Access-Control-Request-Headers
              - Access-Control-Request-Method
          # Minimum TTLs for SRE sanity during testing
          MinTTL: 0
          DefaultTTL: 3600
          MaxTTL: 86400

Outputs:
  LambdaFunctionURL:
    Description: "The direct URL for the Lambda"
    Value: !GetAtt AssetFunctionUrl.FunctionUrl
  
  CloudFrontDomain:
    Description: "The public domain for the proxy"
    Value: !GetAtt AssetDistribution.DomainName
  
  LambdaRoleARN:
    Description: "The IAM Role executing the code"
    Value: !Sub 'arn:aws:iam::${AWS::AccountId}:role/asset-proxy-lambda-role-manual'

  DistributionID:
    Description: "The ID for cache invalidations"
    Value: !Ref AssetDistribution