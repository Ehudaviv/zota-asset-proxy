AWSTemplateFormatVersion: '2010-09-09'
Description: 'Serverless asset proxy - Secured OAC Architecture'

Parameters:
  ImageTag:
    Type: String
  ProjectName:
    Type: String

Resources:
  # --- Storage ---
  AssetBucket:
    Type: AWS::S3::Bucket
    Properties:
      BucketName: !Sub 'asset-proxy-${AWS::AccountId}-${AWS::Region}-vault'

  # --- Lambda Function ---
  AssetProxyFunction:
    Type: AWS::Lambda::Function
    Properties:
      FunctionName: !Sub 'asset-proxy-func-${ImageTag}'
      PackageType: Image
      Code:
        ImageUri: !Sub '${AWS::AccountId}.dkr.ecr.${AWS::Region}.amazonaws.com/zota-asset-proxy:${ImageTag}'
      Role: !Sub 'arn:aws:iam::${AWS::AccountId}:role/asset-proxy-lambda-role-manual'
      Architectures:
        - arm64
      Timeout: 20
      Environment:
        Variables:
          BUCKET_NAME: !Ref AssetBucket

  # --- Function URL (Secured with IAM) ---
  AssetFunctionUrl:
    Type: AWS::Lambda::Url
    Properties:
      AuthType: AWS_IAM
      TargetFunctionArn: !Ref AssetProxyFunction

  # --- Permissions (The OAC Handshake) ---
  UrlInvokePermission:
    Type: AWS::Lambda::Permission
    Properties:
      FunctionName: !Ref AssetProxyFunction
      Action: lambda:InvokeFunctionUrl
      Principal: cloudfront.amazonaws.com
      SourceArn: !Sub 'arn:aws:cloudfront::${AWS::AccountId}:distribution/${AssetDistribution}'
      FunctionUrlAuthType: AWS_IAM

  # --- CloudFront Security (OAC) ---
  LambdaOAC:
    Type: AWS::CloudFront::OriginAccessControl
    Properties: 
      OriginAccessControlConfig: 
        Name: !Sub '${AWS::StackName}-OAC'
        OriginAccessControlOriginType: lambda
        SigningBehavior: always
        SigningProtocol: sigv4

  # --- Origin Request Policy (Fixes Host Header Mismatch) ---
  LambdaOriginRequestPolicy:
    Type: AWS::CloudFront::OriginRequestPolicy
    Properties:
      OriginRequestPolicyConfig:
        Name: !Sub "${AWS::StackName}-LambdaOriginPolicy"
        HeadersConfig:
          HeaderBehavior: AllViewerExceptHostHeader
        CookiesConfig:
          CookieBehavior: none
        QueryStringsConfig:
          QueryStringBehavior: all

  # --- Distribution ---
  AssetDistribution:
    Type: AWS::CloudFront::Distribution
    Properties:
      DistributionConfig:
        Enabled: true
        HttpVersion: http2
        Origins:
          - Id: LambdaOrigin
            DomainName: !Select [2, !Split ["/", !GetAtt AssetFunctionUrl.FunctionUrl]]
            OriginAccessControlId: !Ref LambdaOAC
            CustomOriginConfig:
              OriginProtocolPolicy: https-only
        DefaultCacheBehavior:
          TargetOriginId: LambdaOrigin
          ViewerProtocolPolicy: redirect-to-https
          AllowedMethods: [GET, HEAD, OPTIONS]
          # Modern CloudFront configuration
          CachePolicyId: 4135ea2d-6df8-44a3-9df3-4b5a84be39ad # Managed-CachingDisabled
          OriginRequestPolicyId: !Ref LambdaOriginRequestPolicy

Outputs:
  LambdaFunctionURL:
    Description: "The direct URL for the Lambda"
    Value: !GetAtt AssetFunctionUrl.FunctionUrl
  
  CloudFrontDomain:
    Description: "The public domain for the proxy"
    Value: !GetAtt AssetDistribution.DomainName
  
  LambdaRoleARN:
    Description: "The IAM Role executing the code"
    Value: !Sub 'arn:aws:iam::${AWS::AccountId}:role/asset-proxy-lambda-role-manual'

  DistributionID:
    Description: "The ID for cache invalidations"
    Value: !Ref AssetDistribution