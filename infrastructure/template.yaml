AWSTemplateFormatVersion: '2010-09-09'
Description: 'Serverless asset proxy - Manual Role Bypass'

Parameters:
  ImageTag:
    Type: String
  ProjectName:
    Type: String

Resources:
  AssetBucket:
    Type: AWS::S3::Bucket
    Properties:
      BucketName: !Sub 'asset-proxy-${AWS::AccountId}-${AWS::Region}-vault'

  AssetProxyFunction:
    Type: AWS::Lambda::Function
    Properties:
      FunctionName: !Sub 'asset-proxy-func-${ImageTag}'
      PackageType: Image
      Code:
        ImageUri: !Sub '${AWS::AccountId}.dkr.ecr.${AWS::Region}.amazonaws.com/zota-asset-proxy:${ImageTag}'
      # Using the manually verified role to bypass CFN IAM issues
      Role: !Sub 'arn:aws:iam::${AWS::AccountId}:role/asset-proxy-lambda-role-manual'
      Architectures:
        - arm64
      Timeout: 20
      Environment:
        Variables:
          BUCKET_NAME: !Ref AssetBucket

  AssetFunctionUrl:
    Type: AWS::Lambda::Url
    Properties:
      AuthType: NONE
      TargetFunctionArn: !Ref AssetProxyFunction

  UrlInvokePermission:
    Type: AWS::Lambda::Permission
    Properties:
      FunctionName: !Ref AssetProxyFunction
      Action: lambda:InvokeFunctionUrl
      Principal: "*"
      FunctionUrlAuthType: NONE
  
  AssetDistribution:
    Type: AWS::CloudFront::Distribution
    Properties:
      DistributionConfig:
        Enabled: true
        Origins:
          - Id: LambdaOrigin
            DomainName: 
              Fn::Select:
                - 2
                - Fn::Split:
                    - "/"
                    - !GetAtt AssetFunctionUrl.FunctionUrl
            CustomOriginConfig:
              OriginProtocolPolicy: https-only
        DefaultCacheBehavior:
          TargetOriginId: LambdaOrigin
          ViewerProtocolPolicy: redirect-to-https
          CachePolicyId: 658327ea-f89d-4fab-a63d-7e88639e58f6
          AllowedMethods: [GET, HEAD, OPTIONS]

Outputs:
  LambdaFunctionURL:
    Description: "The direct URL for the Lambda"
    Value: !GetAtt AssetProxyFunctionUrl.FunctionUrl
  
  CloudFrontDomain:
    Description: "The public domain for the proxy"
    Value: !GetAtt AssetProxyDistribution.DomainName
  
  LambdaRoleARN:
    Description: "The IAM Role executing the code"
    Value: !Sub 'arn:aws:iam::${AWS::AccountId}:role/asset-proxy-lambda-role-manual'

  DistributionID:
    Description: "The ID for cache invalidations"
    Value: !Ref AssetProxyDistribution