AWSTemplateFormatVersion: '2010-09-09'
Description: 'Asset Proxy - Sandbox Compliant - IAM Auth with OAC'

Parameters:
  ImageTag:
    Type: String
  ProjectName:
    Type: String

Resources:
  AssetBucket:
    Type: AWS::S3::Bucket
    Properties:
      BucketName: !Sub 'asset-proxy-${AWS::AccountId}-${AWS::Region}-vault'

  # --- COMPLIANT IAM ROLE ---
  AssetProxyLambdaRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: !Sub 'asset-proxy-role-${AWS::StackName}'
      PermissionsBoundary: 'arn:aws:iam::377786476724:policy/CandidatePermissionsBoundary'
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: lambda.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/service-role/AWSLambdaBasicExecutionRole
      Policies:
        - PolicyName: BoundaryAlignment
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - "s3:GetObject"
                  - "s3:ListBucket"
                  - "logs:CreateLogGroup"
                  - "logs:CreateLogStream"
                  - "logs:PutLogEvents"
                  - "ecr:BatchGetImage"
                  - "ecr:GetDownloadUrlForLayer"
                Resource: "*"

  AssetProxyFunction:
    Type: AWS::Lambda::Function
    Properties:
      FunctionName: !Sub 'asset-proxy-func-${ImageTag}'
      PackageType: Image
      Code:
        ImageUri: !Sub '${AWS::AccountId}.dkr.ecr.${AWS::Region}.amazonaws.com/zota-asset-proxy:${ImageTag}'
      Role: !GetAtt AssetProxyLambdaRole.Arn
      Architectures: [arm64]
      Timeout: 20
      Environment:
        Variables:
          BUCKET_NAME: !Ref AssetBucket

  # --- IAM AUTHENTICATED URL ---
  AssetFunctionUrl:
    Type: AWS::Lambda::Url
    Properties:
      AuthType: AWS_IAM # Bypasses the boundary restriction on public URLs
      TargetFunctionArn: !Ref AssetProxyFunction

  # Allow CloudFront to invoke the function URL using SigV4
  UrlInvokePermission:
    Type: AWS::Lambda::Permission
    Properties:
      FunctionName: !Ref AssetProxyFunction
      Action: lambda:InvokeFunctionUrl
      Principal: cloudfront.amazonaws.com
      SourceArn: !Sub 'arn:aws:cloudfront::${AWS::AccountId}:distribution/${AssetDistribution}'
      FunctionUrlAuthType: AWS_IAM

  # --- CLOUDFRONT OAC FOR LAMBDA ---
  LambdaOAC:
    Type: AWS::CloudFront::OriginAccessControl
    Properties: 
      OriginAccessControlConfig: 
        Name: !Sub '${AWS::StackName}-OAC'
        OriginAccessControlOriginType: lambda
        SigningBehavior: always
        SigningProtocol: sigv4

  # --- DISTRIBUTION ---
  AssetDistribution:
    Type: AWS::CloudFront::Distribution
    Properties:
      DistributionConfig:
        Enabled: true
        Origins:
          - Id: LambdaOrigin
            DomainName: !Select [2, !Split ["/", !GetAtt AssetFunctionUrl.FunctionUrl]]
            OriginAccessControlId: !Ref LambdaOAC
            CustomOriginConfig:
              OriginProtocolPolicy: https-only
        DefaultCacheBehavior:
          TargetOriginId: LambdaOrigin
          ViewerProtocolPolicy: redirect-to-https
          AllowedMethods: [GET, HEAD, OPTIONS]
          # Standard Caching Optimized
          CachePolicyId: 658327ea-f89d-4fab-a63d-7e88639e58f6
          # CRITICAL: Use Managed-AllViewerExceptHostHeader (ID: b0594113-f00d-4bb5-8664-586b4618e7d7)
          # This ensures CloudFront signs for the Lambda Host, not the CloudFront Host.
          OriginRequestPolicyId: b0594113-f00d-4bb5-8664-586b4618e7d7

Outputs:
  CloudFrontDomain:
    Value: !GetAtt AssetDistribution.DomainName
  LambdaFunctionUrl:
    Value: !GetAtt AssetFunctionUrl.FunctionUrl