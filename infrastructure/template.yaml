AWSTemplateFormatVersion: '2010-09-09'
Description: 'Serverless asset proxy - Secured OAC Architecture'

Parameters:
  ImageTag:
    Type: String
  ProjectName:
    Type: String

Resources:
  # --- Storage ---
  AssetBucket:
    Type: AWS::S3::Bucket
    Properties:
      BucketName: !Sub 'asset-proxy-${AWS::AccountId}-${AWS::Region}-vault'

  # --- Lambda Function ---
  AssetProxyFunction:
    Type: AWS::Lambda::Function
    Properties:
      FunctionName: !Sub 'asset-proxy-func-${ImageTag}'
      PackageType: Image
      Code:
        ImageUri: !Sub '${AWS::AccountId}.dkr.ecr.${AWS::Region}.amazonaws.com/zota-asset-proxy:${ImageTag}'
      Role: !Sub 'arn:aws:iam::${AWS::AccountId}:role/asset-proxy-lambda-role-manual'
      Architectures:
        - arm64
      Timeout: 20
      Environment:
        Variables:
          BUCKET_NAME: !Ref AssetBucket

  # --- Function URL (Secured with IAM) ---
  AssetFunctionUrl:
    Type: AWS::Lambda::Url
    Properties:
      AuthType: AWS_IAM
      TargetFunctionArn: !Ref AssetProxyFunction

  # --- Permissions (The OAC Handshake) ---
  UrlInvokePermission:
    Type: AWS::Lambda::Permission
    Properties:
      FunctionName: !Ref AssetProxyFunction
      Action: lambda:InvokeFunctionUrl
      Principal: cloudfront.amazonaws.com
      SourceArn: !Sub 'arn:aws:cloudfront::${AWS::AccountId}:distribution/${AssetDistribution}'
      FunctionUrlAuthType: AWS_IAM

  # --- CloudFront Security (OAC) ---
  LambdaOAC:
    Type: AWS::CloudFront::OriginAccessControl
    Properties: 
      OriginAccessControlConfig: 
        Name: !Sub '${AWS::StackName}-OAC'
        OriginAccessControlOriginType: lambda
        SigningBehavior: always
        SigningProtocol: sigv4

  # --- Distribution ---
  AssetDistribution:
    Type: AWS::CloudFront::Distribution
    Properties:
      DistributionConfig:
        Enabled: true
        HttpVersion: http2
        Origins:
          - Id: LambdaOrigin
            DomainName: !Select [2, !Split ["/", !GetAtt AssetFunctionUrl.FunctionUrl]]
            OriginAccessControlId: !Ref LambdaOAC
            CustomOriginConfig:
              OriginProtocolPolicy: https-only
        DefaultCacheBehavior:
          TargetOriginId: LambdaOrigin
          ViewerProtocolPolicy: redirect-to-https
          AllowedMethods: [GET, HEAD, OPTIONS]
          
          # We go back to ForwardedValues because the Managed Policies are 404ing
          # By NOT including "Host" in the Headers list, CloudFront will correctly
          # use the Origin Domain Name for the SigV4 signature.
          ForwardedValues:
            QueryString: true
            Cookies:
              Forward: none
            Headers:
              - Origin
              - Access-Control-Request-Headers
              - Access-Control-Request-Method
          MinTTL: 0
          DefaultTTL: 3600
          MaxTTL: 86400

Outputs:
  LambdaFunctionURL:
    Value: !GetAtt AssetFunctionUrl.FunctionUrl
  CloudFrontDomain:
    Value: !GetAtt AssetDistribution.DomainName