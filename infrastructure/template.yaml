AWSTemplateFormatVersion: '2010-09-09'
Description: 'Asset Proxy - Sandbox Compliant - No Functions'

Parameters:
  ImageTag:
    Type: String
  ProjectName:
    Type: String

Resources:
  AssetBucket:
    Type: AWS::S3::Bucket
    Properties:
      BucketName: !Sub 'asset-proxy-${AWS::AccountId}-${AWS::Region}-vault'

  # --- COMPLIANT IAM ROLE ---
  AssetProxyLambdaRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: !Sub 'asset-proxy-role-${AWS::StackName}'
      PermissionsBoundary: 'arn:aws:iam::377786476724:policy/CandidatePermissionsBoundary'
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: lambda.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/service-role/AWSLambdaBasicExecutionRole
      Policies:
        - PolicyName: S3Access
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - s3:GetObject
                  - s3:ListBucket
                Resource:
                  - !Sub 'arn:aws:s3:::${AssetBucket}'
                  - !Sub 'arn:aws:s3:::${AssetBucket}/*'

  AssetProxyFunction:
    Type: AWS::Lambda::Function
    Properties:
      FunctionName: !Sub 'asset-proxy-func-${ImageTag}'
      PackageType: Image
      Code:
        ImageUri: !Sub '${AWS::AccountId}.dkr.ecr.${AWS::Region}.amazonaws.com/zota-asset-proxy:${ImageTag}'
      Role: !GetAtt AssetProxyLambdaRole.Arn
      Architectures: [arm64]
      Timeout: 20
      Environment:
        Variables:
          BUCKET_NAME: !Ref AssetBucket

  # --- PUBLIC URL (No OAC) ---
  AssetFunctionUrl:
    Type: AWS::Lambda::Url
    Properties:
      AuthType: NONE # Bypasses SigV4 issues
      TargetFunctionArn: !Ref AssetProxyFunction

  UrlInvokePermission:
    Type: AWS::Lambda::Permission
    Properties:
      FunctionName: !Ref AssetProxyFunction
      Action: lambda:InvokeFunctionUrl
      Principal: "*"
      FunctionUrlAuthType: NONE

  # --- DISTRIBUTION ---
  AssetDistribution:
    Type: AWS::CloudFront::Distribution
    Properties:
      DistributionConfig:
        Enabled: true
        Origins:
          - Id: LambdaOrigin
            DomainName: !Select [2, !Split ["/", !GetAtt AssetFunctionUrl.FunctionUrl]]
            CustomOriginConfig:
              OriginProtocolPolicy: https-only
            # SRE Tip: Custom Headers can be used in your Go code 
            # to verify the request actually came from CloudFront.
            OriginCustomHeaders:
              - HeaderName: X-Custom-Auth-Header
                HeaderValue: "super-secret-validation-string"
        DefaultCacheBehavior:
          TargetOriginId: LambdaOrigin
          ViewerProtocolPolicy: redirect-to-https
          AllowedMethods: [GET, HEAD, OPTIONS]
          # Standard caching
          CachePolicyId: 658327ea-f89d-4fab-a63d-7e88639e58f6
          ForwardedValues:
            QueryString: true
            Cookies: { Forward: none }

Outputs:
  CloudFrontDomain:
    Value: !GetAtt AssetDistribution.DomainName