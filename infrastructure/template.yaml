AWSTemplateFormatVersion: '2010-09-09'
Description: 'Serverless asset proxy - Secured OAC Architecture with Managed IAM'

Parameters:
  ImageTag:
    Type: String
  ProjectName:
    Type: String

Resources:
  # --- Storage ---
  AssetBucket:
    Type: AWS::S3::Bucket
    Properties:
      BucketName: !Sub 'asset-proxy-${AWS::AccountId}-${AWS::Region}-vault'

  # --- Managed IAM Role ---
  AssetProxyLambdaRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: lambda.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/service-role/AWSLambdaBasicExecutionRole
      Policies:
        - PolicyName: S3VaultReadAccess
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - s3:GetObject
                  - s3:ListBucket
                Resource:
                  - !Sub 'arn:aws:s3:::${AssetBucket}'
                  - !Sub 'arn:aws:s3:::${AssetBucket}/*'

  # --- Lambda Function ---
  AssetProxyFunction:
    Type: AWS::Lambda::Function
    Properties:
      FunctionName: !Sub 'asset-proxy-func-${ImageTag}'
      PackageType: Image
      Code:
        ImageUri: !Sub '${AWS::AccountId}.dkr.ecr.${AWS::Region}.amazonaws.com/zota-asset-proxy:${ImageTag}'
      Role: !GetAtt AssetProxyLambdaRole.Arn
      Architectures:
        - arm64
      Timeout: 20
      Environment:
        Variables:
          BUCKET_NAME: !Ref AssetBucket

  # --- Function URL (IAM Auth) ---
  AssetFunctionUrl:
    Type: AWS::Lambda::Url
    Properties:
      AuthType: AWS_IAM
      TargetFunctionArn: !Ref AssetProxyFunction

  # --- OAC Handshake Permission ---
  UrlInvokePermission:
    Type: AWS::Lambda::Permission
    Properties:
      FunctionName: !Ref AssetProxyFunction
      Action: lambda:InvokeFunctionUrl
      Principal: cloudfront.amazonaws.com
      SourceArn: !Sub 'arn:aws:cloudfront::${AWS::AccountId}:distribution/${AssetDistribution}'
      FunctionUrlAuthType: AWS_IAM

  # --- CloudFront Security (OAC) ---
  LambdaOAC:
    Type: AWS::CloudFront::OriginAccessControl
    Properties: 
      OriginAccessControlConfig: 
        Name: !Sub '${AWS::StackName}-OAC'
        OriginAccessControlOriginType: lambda
        SigningBehavior: always
        SigningProtocol: sigv4

  # --- THE FIX: CloudFront Function ---
  # We use a simple variable for the hostname to satisfy Fn::Sub syntax.
  HostHeaderFunction:
    Type: AWS::CloudFront::Function
    Properties:
      Name: !Sub "${AWS::StackName}-FixHost"
      FunctionConfig:
        Comment: "Fixes Host header for Lambda OAC signature"
        Runtime: cloudfront-js-1.0
      FunctionCode: 
        Fn::Sub: 
          - |
            function handler(event) {
              var request = event.request;
              request.headers['host'] = { value: '${LambdaHost}' };
              return request;
            }
          - LambdaHost: !Select [2, !Split ["/", !GetAtt AssetFunctionUrl.FunctionUrl]]

  # --- Distribution ---
  AssetDistribution:
    Type: AWS::CloudFront::Distribution
    Properties:
      DistributionConfig:
        Enabled: true
        HttpVersion: http2
        Origins:
          - Id: LambdaOrigin
            DomainName: !Select [2, !Split ["/", !GetAtt AssetFunctionUrl.FunctionUrl]]
            OriginAccessControlId: !Ref LambdaOAC
            CustomOriginConfig:
              OriginProtocolPolicy: https-only
        DefaultCacheBehavior:
          TargetOriginId: LambdaOrigin
          ViewerProtocolPolicy: redirect-to-https
          AllowedMethods: [GET, HEAD, OPTIONS]
          FunctionAssociations:
            - EventType: viewer-request
              FunctionARN: !GetAtt HostHeaderFunction.FunctionARN
          ForwardedValues:
            QueryString: true
            Cookies:
              Forward: none
            Headers:
              - Origin
              - Access-Control-Request-Headers
              - Access-Control-Request-Method
          MinTTL: 0
          DefaultTTL: 3600
          MaxTTL: 86400

Outputs:
  LambdaFunctionURL:
    Value: !GetAtt AssetFunctionUrl.FunctionUrl
  CloudFrontDomain:
    Value: !GetAtt AssetDistribution.DomainName